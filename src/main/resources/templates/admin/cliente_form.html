<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head(titulo=#{app.form.client})}"></head>
<body>
    <div class="d-flex flex-row">
        <div th:replace="~{layout :: sidebar}"></div>
        <div class="w-100 d-flex flex-column">
            <div th:replace="~{layout :: header}"></div>
            
            <div class="container mt-4" style="max-width: 600px;">
                <div class="card shadow-sm">
                    <div class="card-header bg-primary text-white">
                        <h4 class="mb-0" th:text="${cliente.id == null} ? #{app.new.client} : #{app.edit}"></h4>
                    </div>
                    <div class="card-body">
                        <div th:if="${erro}" class="alert alert-danger" th:text="${erro}"></div>
                        
                        <form th:action="@{/admin/clientes/salvar}" th:object="${cliente}" method="post">
                            <input type="hidden" th:field="*{id}">
                            <div class="mb-3">
                                <label class="form-label" th:text="#{app.name}"></label>
                                <input type="text" th:field="*{nome}" class="form-control" required>
                            </div>
                            <div class="row mb-3">
                                <div class="col">
                                    <label class="form-label" th:text="#{app.email}"></label>
                                    <input type="email" th:field="*{email}" class="form-control" required>
                                </div>
                                <div class="col">
                                    <label class="form-label" th:text="#{app.password}"></label>
                                    <input type="password" th:field="*{senha}" class="form-control" required>
                                </div>
                            </div>
                            <div class="row mb-3">
                                <div class="col">
                                    <label class="form-label" th:text="#{app.cpf}"></label>
                                    <input type="text" th:field="*{cpf}" class="form-control" required>
                                </div>
                                <div class="col">
                                    <label class="form-label" th:text="#{app.phone}"></label>
                                    <input type="text" th:field="*{telefone}" class="form-control" required>
                                </div>
                            </div>
                            <div class="row mb-4">
                                <div class="col">
                                    <label class="form-label" th:text="#{app.gender}"></label>
                                    <select th:field="*{sexo}" class="form-select" required>
                                        <option value="" th:text="#{app.gender.select}"></option>
                                        <option value="M" th:text="#{app.gender.m}"></option>
                                        <option value="F" th:text="#{app.gender.f}"></option>
                                    </select>
                                </div>
                                <div class="col">
                                    <label class="form-label" th:text="#{app.birthdate}"></label>
                                    <input type="date" th:field="*{dataNascimento}" class="form-control" required>
                                </div>
                            </div>
                            <div class="d-flex justify-content-end">
                                <a th:href="@{/admin/clientes}" class="btn btn-secondary me-2" th:text="#{app.cancel}"></a>
                                <button type="submit" class="btn btn-primary" th:text="#{app.save}"></button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
