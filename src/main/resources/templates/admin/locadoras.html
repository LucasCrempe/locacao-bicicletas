<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head(titulo=#{app.locadoras})}"></head>
<body>
    <div class="d-flex flex-row">
        <div th:replace="~{layout :: sidebar}"></div>
        <div class="w-100 d-flex flex-column">
            <div th:replace="~{layout :: header}"></div>
            
            <div class="container mt-4">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h2 th:text="#{app.locadoras}">Locadoras</h2>
                    <a th:href="@{/admin/locadoras/nova}" class="btn btn-success" th:text="#{app.new.locadora}">+ Nova Locadora</a>
                </div>
                
                <div class="table-responsive">
                    <table class="table table-striped table-bordered" th:if="${not #lists.isEmpty(locadoras)}">
                        <thead class="table-dark">
                            <tr>
                                <th th:text="#{app.name}">Nome</th>
                                <th th:text="#{app.cnpj}">CNPJ</th>
                                <th th:text="#{app.email}">E-mail</th>
                                <th th:text="#{app.city}">Cidade</th>
                                <th th:text="#{app.actions}">Ações</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="locadora : ${locadoras}">
                                <td th:text="${locadora.nome}"></td>
                                <td th:text="${locadora.cnpj}"></td>
                                <td th:text="${locadora.email}"></td>
                                <td th:text="${locadora.cidade}"></td>
                                <td>
                                    <a th:href="@{/admin/locadoras/editar/{id}(id=${locadora.id})}" class="btn btn-sm btn-primary" th:text="#{app.edit}">Editar</a>
                                    <a th:href="@{/admin/locadoras/excluir/{id}(id=${locadora.id})}" class="btn btn-sm btn-danger" th:text="#{app.delete}" th:data-confirm="#{app.confirm.delete}" onclick="return confirm(this.getAttribute('data-confirm'));">Excluir</a>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                    <div th:if="${#lists.isEmpty(locadoras)}" class="alert alert-warning" th:text="#{app.empty.locadoras}"></div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
