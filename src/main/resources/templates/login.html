<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="#{app.login}"></title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #ecf0f1; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { background: white; padding: 40px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 300px; text-align: center; }
        input { width: 90%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; }
        .btn { width: 100%; padding: 10px; background-color: #3498db; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .btn:hover { background-color: #2980b9; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2 th:text="#{app.title}"></h2>
        <h3 th:text="#{app.login}"></h3>
        <form th:action="@{/login}" method="post">
            <input type="text" name="username" th:placeholder="#{app.email}" required>
            <input type="password" name="password" th:placeholder="#{app.password}" required>
            <button type="submit" class="btn" th:text="#{app.login}"></button>
        </form>
        <div style="margin-top: 15px;">
            <a th:href="@{/}" style="text-decoration: none; color: #7f8c8d; font-size: 0.9em;">Voltar ao Início</a>
        </div>
    </div>
</body>
</html>
