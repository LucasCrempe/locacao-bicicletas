<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head(titulo=#{app.title})}"></head>
<body>
    <div class="d-flex flex-row">
        <div th:replace="~{layout :: sidebar}"></div>
        <div class="w-100 d-flex flex-column">
            <div th:replace="~{layout :: header}"></div>
            <div class="container mt-4">
                <h2>Buscar Locadoras</h2>
                <form th:action="@{/}" method="get" class="d-flex mb-4" style="max-width: 400px;">
                    <input type="text" name="cidade" class="form-control me-2" placeholder="Digite a Cidade">
                    <button type="submit" class="btn btn-primary">Buscar</button>
                </form>
                
                <div class="table-responsive">
                    <table class="table table-striped table-bordered" th:if="${not #lists.isEmpty(locadoras)}">
                        <thead class="table-dark">
                            <tr>
                                <th th:text="#{app.name}">Nome</th>
                                <th th:text="#{app.city}">Cidade</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="locadora : ${locadoras}">
                                <td th:text="${locadora.nome}"></td>
                                <td th:text="${locadora.cidade}"></td>
                            </tr>
                        </tbody>
                    </table>
                    <div th:if="${#lists.isEmpty(locadoras)}" class="alert alert-secondary">Nenhuma locadora encontrada.</div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
