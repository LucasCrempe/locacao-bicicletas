<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:fragment="head(titulo)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${titulo}"></title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

    <div th:fragment="sidebar" class="d-flex flex-column flex-shrink-0 p-3 text-white bg-dark" style="width: 250px; min-height: 100vh;">
        <a href="/" class="d-flex align-items-center mb-3 mb-md-0 me-md-auto text-white text-decoration-none">
            <span class="fs-5" th:text="#{app.title}">Sistema</span>
        </a>
        <hr>
        <ul class="nav nav-pills flex-column mb-auto">
            <li class="nav-item">
                <a th:href="@{/}" class="nav-link text-white" th:text="#{app.menu.public}"></a>
            </li>
            <li sec:authorize="hasRole('ADMIN')">
                <a th:href="@{/admin/clientes}" class="nav-link text-white" th:text="#{app.menu.manage_clients}"></a>
            </li>
            <li sec:authorize="hasRole('ADMIN')">
                <a th:href="@{/admin/locadoras}" class="nav-link text-white" th:text="#{app.menu.manage_locadoras}"></a>
            </li>
            <li sec:authorize="hasRole('CLIENTE')">
                <a th:href="@{/cliente/locacoes}" class="nav-link text-white" th:text="#{app.menu.my_rentals}"></a>
            </li>
            <li sec:authorize="hasRole('LOCADORA')">
                <a th:href="@{/locadora/locacoes}" class="nav-link text-white" th:text="#{app.menu.received_rentals}"></a>
            </li>
        </ul>
    </div>

    <nav th:fragment="header" class="navbar navbar-expand-lg navbar-light bg-light border-bottom px-4 w-100">
        <div class="d-flex w-100 justify-content-between align-items-center">
            <div>
                <a href="?lang=pt" class="text-decoration-none fw-bold text-dark me-2">PT</a>| 
                <a href="?lang=en" class="text-decoration-none fw-bold text-dark ms-2">EN</a>
            </div>
            <div sec:authorize="isAuthenticated()">
                <span th:text="#{app.welcome}">Bem-vindo</span>, <strong sec:authentication="name"></strong>
                <form th:action="@{/logout}" method="post" class="d-inline ms-3">
                    <button type="submit" class="btn btn-sm btn-danger" th:text="#{app.logout}">Sair</button>
                </form>
            </div>
            <div sec:authorize="!isAuthenticated()">
                <a th:href="@{/login}" class="btn btn-sm btn-primary" th:text="#{app.login}">Entrar</a>
            </div>
        </div>
    </nav>

</body>
</html>
