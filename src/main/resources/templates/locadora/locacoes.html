<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head(titulo='Locações Recebidas')}"></head>
<body>
    <div class="d-flex flex-row">
        <div th:replace="~{layout :: sidebar}"></div>
        <div class="w-100 d-flex flex-column">
            <div th:replace="~{layout :: header}"></div>
            
            <div class="container mt-4">
                <h2>Bicicletas Alugadas</h2>
                
                <div class="table-responsive mt-3">
                    <table class="table table-striped table-bordered" th:if="${not #lists.isEmpty(locacoes)}">
                        <thead class="table-dark">
                            <tr>
                                <th>Data/Hora</th>
                                <th>Cliente</th>
                                <th>CPF</th>
                                <th>Telefone</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="loc : ${locacoes}">
                                <td th:text="${#temporals.format(loc.dataHora, 'dd/MM/yyyy HH:mm')}"></td>
                                <td th:text="${loc.cliente.nome}"></td>
                                <td th:text="${loc.cliente.cpf}"></td>
                                <td th:text="${loc.cliente.telefone}"></td>
                            </tr>
                        </tbody>
                    </table>
                    <div th:if="${#lists.isEmpty(locacoes)}" class="alert alert-secondary">Nenhuma locação agendada no momento.</div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
